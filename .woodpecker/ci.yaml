# Lint + test notmad on every push to main and every pull request.
#
# Pure-Rust library — no external services needed. The `signal` integration
# test spawns the `staged_shutdown_demo` binary and sends it real
# SIGTERM/SIGKILL (via libc), so it runs like any other test in the container.

when:
  - event: push
    branch: main
  - event: pull_request

# Gitea reports this repo's clone_url as the internal `git.i.kjuulh.io`, which the
# CI runner can't reach (the default clone times out → exit 128). Clone over the
# public `git.kjuulh.io` instead; the repo is public, so no auth is needed.
# Remove once Gitea's clone_url / ROOT_URL is corrected server-side.
clone:
  git:
    image: woodpeckerci/plugin-git
    commands:
      - git init -b main
      - git config --global --add safe.directory "$CI_WORKSPACE"
      - git remote add origin "https://git.kjuulh.io/$CI_REPO.git"
      - git fetch --tags origin "$CI_COMMIT_REF"
      - git checkout -qf "$CI_COMMIT_SHA"

steps:
  test:
    # edition 2024 needs rustc >= 1.85; rust:1-bookworm tracks the latest 1.x.
    image: rust:1-bookworm
    environment:
      CARGO_TERM_COLOR: always
    commands:
      - rustup component add rustfmt clippy
      - cargo fmt --all --check
      - cargo clippy --all-targets -- -D warnings
      - cargo test --all
      - cargo build --examples --bins
